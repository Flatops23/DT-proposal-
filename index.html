<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flood Monitoring</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --danger: #e74c3c;
            --warning: #f1c40f;
            --safe: #2ecc71;
            --bg: #f4f7f6;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .container { max-width: 1000px; margin: auto; }
        
        header { 
            background: var(--primary); color: white; padding: 1rem; 
            border-radius: 8px; display: flex; flex-direction: column; text-align: center; gap: 10px;
        }

        @media (min-width: 768px) {
            header { flex-direction: row; justify-content: space-between; text-align: left; }
            .box-layout { grid-template-columns: 1fr 1fr; }
            body { padding: 20px; }
        }

        .box-layout { display: grid; grid-template-columns: 1fr; gap: 15px; margin-top: 15px; }
        .card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }

        .drain-ui {
            position: relative; height: 180px; width: 100%; 
            background: #eee; border: 4px solid #7f8c8d; 
            border-top: none; border-radius: 0 0 40px 40px; overflow: hidden;
            margin: 10px 0;
        }
        
        .lvl-bar {
            position: absolute; bottom: 0; width: 100%;
            background: rgba(52, 152, 219, 0.7);
            transition: height 0.8s ease-in-out, background 0.5s;
        }

        .tag {
            position: absolute; top: 10px; right: 10px;
            padding: 5px 10px; border-radius: 4px; font-weight: bold; font-size: 0.75rem;
        }

        .btn { 
            padding: 12px 15px; border: none; border-radius: 4px; cursor: pointer; 
            font-weight: bold; width: 100%; margin-bottom: 10px; transition: 0.3s;
        }
        
        @media (min-width: 480px) { .btn { width: auto; margin-right: 5px; } }

        .btn-test { background: var(--accent); color: white; }
        .btn-clr { background: #95a5a6; color: white; }
        .btn-start { background: var(--safe); color: white; margin-top: 10px; }
        
        #msg-box {
            display: none; padding: 15px; margin-top: 15px; border-radius: 8px;
            text-align: center; font-weight: bold; animation: flash 0.5s infinite;
        }

        @keyframes flash { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<audio id="aud" src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg" loop></audio>

<div class="container">
    <header>
        <div>
            <h2 style="margin:0; font-size: 1.4rem;">FLOOD SENSOR SYSTEM</h2>
            <p style="margin:5px 0 0 0; font-size: 0.9rem;">By: <strong>John Philip Tiwana</strong></p>
        </div>
        <div id="clock" style="font-weight: bold; font-family: monospace;">00:00:00</div>
    </header>

    <div id="msg-box"></div>

    <div class="box-layout">
        <div class="card">
            <h3>Drainage Sensor</h3>
            <div class="drain-ui">
                <div id="water" class="lvl-bar" style="height: 20%;"></div>
                <div id="stat" class="tag" style="background: var(--safe); color: white;">SAFE</div>
            </div>
            <p>Depth: <span id="num">20</span>%</p>
            <div>
                <button class="btn btn-test" onclick="add()">Simulate Rain</button>
                <button class="btn btn-clr" onclick="reset()">Reset System</button>
            </div>
        </div>

        <div class="card">
            <h3>Solutions</h3>
            <ul style="padding-left: 20px; line-height: 1.6;">
                <li><strong>Infrastructure:</strong> Modern drainage.</li>
                <li><strong>Waste:</strong> Debris blocking.</li>
                <li><strong>Environment:</strong> Reforestation.</li>
                <li><strong>Alerts:</strong> Real-time sensors.</li>
            </ul>
        </div>
    </div>
</div>

<script>
    let h = 20;
    const w = document.getElementById('water');
    const n = document.getElementById('num');
    const s = document.getElementById('stat');
    const b = document.getElementById('msg-box');
    const aud = document.getElementById('aud');

    function getTime() {
        const d = new Date();
        document.getElementById('clock').innerText = d.toLocaleTimeString();
    }
    setInterval(getTime, 1000);

    

    function add() {
        if (h < 100) {
            h += 15;
            refresh();
        }
    }

    function reset() {
        h = 20;
        aud.pause();
        aud.currentTime = 0;
        refresh();
    }

    function refresh() {
        w.style.height = h + '%';
        n.innerText = h;

        if (h >= 85) {
            s.innerText = "CRITICAL";
            s.style.background = "var(--danger)";
            w.style.background = "rgba(231, 76, 60, 0.8)";
            show("EVACUATE: Flood level critical!", "var(--danger)");
            
            aud.play(); 

        } else if (h >= 60) {
            s.innerText = "WARNING";
            s.style.background = "var(--warning)";
            w.style.background = "rgba(241, 196, 15, 0.8)";
            show("WARNING: Level rising.", "var(--warning)");
            aud.pause();
        } else {
            s.innerText = "SAFE";
            s.style.background = "var(--safe)";
            w.style.background = "rgba(52, 152, 219, 0.7)";
            b.style.display = "none";
            aud.pause();
        }
    }

    function show(txt, c) {
        b.innerText = txt;
        b.style.background = c;
        b.style.color = (c === "var(--warning)") ? "black" : "white";
        b.style.display = "block";
    }

    if ("serviceWorker" in navigator) {
        navigator.serviceWorker
          .register("/service-worker.js")
          .then(() => {
            console.log("ayos! rehistro as service worker");
          })
          .catch((error) => {
            console.log("Registration failed: ", error);
          });
      }
</script>

</body>
</html>
