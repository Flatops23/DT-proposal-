<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
    <title>Flood Monitoring</title>
    <style>
        :root { --primary: #2c3e50; --danger: #e74c3c; --safe: #2ecc71; --bg: #f4f7f6; }
        body { font-family: sans-serif; background: var(--bg); text-align: center; padding: 10px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        .drainage { height: 150px; background: #eee; border: 4px solid #7f8c8d; border-radius: 0 0 30px 30px; position: relative; overflow: hidden; margin: 20px 0; }
        .water { position: absolute; bottom: 0; width: 100%; background: #3498db; transition: height 0.5s; }
        .btn { padding: 15px; width: 100%; margin: 5px 0; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-test { background: var(--primary); color: white; }
    </style>
</head>
<body>

    <h2>FLOOD SENSOR</h2>
    
    <div class="card">
        <div class="drainage">
            <div id="water" class="water" style="height: 20%;"></div>
        </div>
        <h3 id="status">STATUS: SAFE</h3>
        <p>Level: <span id="level-text">20</span>%</p>
        
        <button class="btn btn-test" onclick="simulate()">Simulate Heavy Rain</button>
        <button class="btn" onclick="reset()">Clear Drains</button>
    </div>

    <audio id="alarm" loop>
        <source src="https://www.soundjay.com/buttons/beep-01a.mp3" type="audio/mpeg">
    </audio>

    <script>
        let level = 20;
        const alarm = document.getElementById('alarm');

        function simulate() {
            // This 'unlocks' the sound so it can play later
            alarm.play().then(() => {
                alarm.pause(); 
            }).catch(e => console.log("Waiting for user interaction"));

            if (level < 100) {
                level += 20;
                updateUI();
            }
        }

        function reset() {
            level = 20;
            alarm.pause();
            alarm.currentTime = 0;
            updateUI();
        }

        function updateUI() {
            document.getElementById('water').style.height = level + '%';
            document.getElementById('level-text').innerText = level;
            
            if (level >= 80) {
                document.getElementById('status').innerText = "STATUS: CRITICAL";
                document.getElementById('status').style.color = "red";
                alarm.play(); // This will work now because you clicked 'Simulate'
            } else {
                document.getElementById('status').innerText = "STATUS: SAFE";
                document.getElementById('status').style.color = "green";
                alarm.pause();
            }
        }

        // Register Service Worker for Icon/Install support
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("service-worker.js");
        }
    </script>
</body>
</html>
