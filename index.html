<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <link  rel="stylesheet" href="style.css">
    <title>Flood Monitoring</title>
    
</head>
<body>

    <h2>FLOOD MONITOR</h2>
    <div id="warn"> EVACUATE NOW! </div>

    <div class="wrap">
        <div class="box">
            <h3>Sensor</h3>
            <div id="drn"><div id="wtr" style="height: 20%;"></div></div>
            <p>Lvl: <span id="txt-l">20</span>% | <span id="txt-s">SAFE</span></p>
            <button class="btn b-add" onclick="add()">+ Rain</button>
            <button class="btn" onclick="rst()">Reset</button>
        </div>

        <div class="box">
            <h3>History</h3>
            <div style="overflow-x:auto;">
                <table>
                    <thead><tr><th>Time</th><th>%</th><th>Note</th><th>Action</th></tr></thead>
                    <tbody id="tb"></tbody>
                </table>
            </div>
            <button class="btn b-clr" style="margin-top:10px;" onclick="clr()">Clear All</button>
        </div>
    </div>

    <script>
        let lvl = 20;
        let ctx = null;
        let s_int = null;

        window.onload = () => { show(); };

        function add() {
            if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
            if (lvl < 100) {
                lvl += 20;
                upd();
                if (lvl >= 80) save(lvl, "DANGER");
            }
        }

        function upd() {
            const w = document.getElementById('wtr');
            const tl = document.getElementById('txt-l');
            const ts = document.getElementById('txt-s');
            const wn = document.getElementById('warn');

            w.style.height = lvl + '%';
            tl.innerText = lvl;

            if (lvl >= 80) {
                w.classList.add('crit');
                ts.innerText = "DANGER";
                wn.style.display = "block";
                play();
            } else {
                w.classList.remove('crit');
                ts.innerText = "SAFE";
                wn.style.display = "none";
                stop();
            }
        }

        function save(v, n) {
            let d = JSON.parse(localStorage.getItem("f_logs")) || [];
            d.push({id: Date.now(), t: new Date().toLocaleTimeString(), v: v + "%", n: n});
            localStorage.setItem("f_logs", JSON.stringify(d));
            show();
        }

        function show() {
            let d = JSON.parse(localStorage.getItem("f_logs")) || [];
            let b = document.getElementById("tb");
            b.innerHTML = "";
            d.forEach(i => {
                b.innerHTML += `<tr><td>${i.t}</td><td>${i.v}</td><td>${i.n}</td>
                    <td><button class="btn" onclick="edt(${i.id})">Edit</button>
                    <button class="btn" onclick="del(${i.id})">X</button></td></tr>`;
            });
        }

        function edt(id) {
            let d = JSON.parse(localStorage.getItem("f_logs"));
            let m = prompt("New note:");
            if (m) {
                let x = d.findIndex(l => l.id === id);
                d[x].n = m;
                localStorage.setItem("f_logs", JSON.stringify(d));
                show();
            }
        }

        function del(id) {
            let d = JSON.parse(localStorage.getItem("f_logs"));
            localStorage.setItem("f_logs", JSON.stringify(d.filter(l => l.id !== id)));
            show();
        }

        function clr() { if(confirm("Clear?")) { localStorage.removeItem("f_logs"); show(); } }

        function rst() { lvl = 20; upd(); }

        function play() {
            if (s_int) return;
            s_int = setInterval(() => {
                let o = ctx.createOscillator();
                let g = ctx.createGain();
                o.type = "sawtooth";
                o.frequency.setValueAtTime(400, ctx.currentTime);
                o.frequency.exponentialRampToValueAtTime(1000, ctx.currentTime + 0.4);
                g.gain.setValueAtTime(0.05, ctx.currentTime);
                o.connect(g); g.connect(ctx.destination);
                o.start(); o.stop(ctx.currentTime + 0.4);
            }, 500);
        }

        function stop() { clearInterval(s_int); s_int = null; }
        
        if ("serviceWorker" in navigator) {
        navigator.serviceWorker
          .register("/service-worker.js")
          .then(() => {
            console.log("ayos! rehistro as service worker");
          })
          .catch((error) => {
            console.log("Registration failed: ", error);
          });
      }
    </script>
</body>
</html>
